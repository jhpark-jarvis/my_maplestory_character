<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
  <title>내 계정/캐릭터 찾기</title>
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      <script>
        document.addEventListener('DOMContentLoaded', function() {
          {% for category, message in messages %}
            alert("{{ message }}");
          {% endfor %}
        });
      </script>
    {% endif %}
  {% endwith %}
</head>
<script>


  const account_list = '{{account_list}}'
</script>
<body>
  <div class="login-container">
    <div class="login-box">
      <img src="https://style-finder.nexon.com/anims/anim-1-9.png" alt="MapleStory" class="login-image">
      <h1>Find My Maple</h1>
      <p class="subtitle">총 <b>{{account_count}}</b>개의 계정을 찾았습니다.</p>
      <div class="form-group">
        <p>{{account_list}}</p>
        <p>{{account_first_character}}</p>
        <label for="api_key">API 키</label>
        <input 
          type="text" 
          id="api_key" 
          name="api_key" 
          class="api-input"
          placeholder="ex) live_**********" 
          required
        >
      </div>
      
      <div class="button-group">
        <button type="submit" class="btn btn-login">로그인</button>
        <button type="button" class="btn btn-find-api" onclick="window.open('https://openapi.nexon.com/', '_blank')">
          API 찾기
        </button>
      </div>
      
      <p class="help-text"><a href="https://openapi.nexon.com/" target="_blank" style="color: #667eea; text-decoration: underline;">Nexon Open API</a>에서 API 키를 발급받으세요</p>
    </div>
  </div>
</body>
</html>
